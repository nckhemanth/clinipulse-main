spring:
  application:
    name: clinipulse-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/clinipulse}
    username: ${DATABASE_USERNAME:clinipulse}
    password: ${DATABASE_PASSWORD:clinipulse}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:9000}
  ai:
    openai:
      api-key: ${AI_API_KEY:local-development-key}
      base-url: ${AI_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${AI_CHAT_MODEL:llama3.3:70b}
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:nomic-embed-text}
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:http://localhost}
          port: ${CHROMA_PORT:8000}

clinipulse:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    enabled: ${SECURITY_ENABLED:true}
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:UseDevelopmentStorage=true}
    container: ${AZURE_STORAGE_CONTAINER:medical-documents}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
